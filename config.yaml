name: "Bouncer"
description: "Bouncer MCP for ensuring email deliverability"
icon: "assets/icon.png"

auth:
  type: none

tools:
  - name: "verify_email"
    description: "Verify a single email address in real time — checks syntax, domain, and SMTP deliverability"
  - name: "verify_domain"
    description: "Verify a domain for valid MX records, catch-all behavior, and disposable status"
  - name: "check_credits"
    description: "Check the number of email verification credits available"
  - name: "verify_emails_sync"
    description: "Verify multiple emails synchronously — waits for all results before returning"
  - name: "create_batch_verification"
    description: "Create an asynchronous batch email verification job for large lists"
  - name: "get_batch_status"
    description: "Check the status of an asynchronous batch verification job"
  - name: "get_batch_results"
    description: "Download results from a completed batch verification job"
  - name: "finish_batch"
    description: "Finish a running batch early and return credits for unverified emails"
  - name: "delete_batch"
    description: "Delete a batch verification job and all associated data"
  - name: "create_toxicity_check"
    description: "Create a toxicity check job for a list of email addresses"
  - name: "get_toxicity_status"
    description: "Check the status of a toxicity check job"
  - name: "get_toxicity_results"
    description: "Download toxicity scores for a completed toxicity check"
  - name: "delete_toxicity_check"
    description: "Delete a toxicity check job and its results"
